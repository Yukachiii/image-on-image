<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宣伝アンバサダー画像メーカー</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; }
        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; width: 100%; justify-content: center; }
        .editor-section { flex: 1; min-width: 300px; max-width: 500px; }
        .info-section { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-self: flex-start; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .slider-label { display: block; margin-top: 10px; font-weight: bold; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; cursor: pointer; }
        
        #editor-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #eee;
            overflow: hidden;
            border: 4px solid #f472b6;
            margin-bottom: 20px;
            cursor: move;
            touch-action: none;
        }
        #base-image {
            position: absolute;
            transform-origin: center center;
            display: none;
            user-select: none;
            pointer-events: none;
        }
        #overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            user-select: none;
            width: 100%;
        }
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 20px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: #10b981; color: white; display: none; margin-top: 20px; font-size: 1.1em; }
        .btn-save:hover { background: #059669; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #size-controls { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* 保存用プレビュー画面のスタイル */
        #save-preview {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        #save-preview img {
            max-width: 100%;
            max-height: 70vh;
            border: 2px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .close-btn { background: #666; color: white; width: auto; padding: 10px 40px; margin-top: 20px; }

        h3 { margin-top: 0; color: #f472b6; border-bottom: 2px solid #fdf2f8; padding-bottom: 10px; }
        .usage-list { padding-left: 20px; line-height: 1.6; }
        footer { margin-top: 40px; padding: 20px; font-size: 0.8em; color: #999; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="editor-section">
        <div class="controls">
            <h3>宣伝アンバサダー画像作成</h3>
            <div class="input-group">
                <label>1. 背景写真を選択: </label>
                <input type="file" id="upload-base" accept="image/*">
            </div>
            <div class="input-group">
                <label>2. フレームを選択:</label>
                <select id="frame-selector">
                    <option value="image1.png">蓮ノ空</option>
                    <option value="image2.png">日野下花帆</option>
                    <option value="image3.png">百生吟子</option>
                    <option value="image4.png">乙宗梢</option>
                    <option value="image5.png">村野さやか</option>
                    <option value="image6.png">徒町小鈴</option>
                    <option value="image7.png">夕霧綴理</option>
                    <option value="image8.png">大沢瑠璃乃</option>
                    <option value="image9.png">安養寺姫芽</option>
                    <option value="image10.png">藤島慈</option>
                    <option value="image11.png">セラス・柳田・リリエンフェルト</option>
                    <option value="image12.png">桂城泉</option>
                </select>
            </div>
            <div id="size-controls">
                <div class="input-group">
                    <span class="slider-label">3. 背景の拡大縮小:</span>
                    <input type="range" id="bg-scale-slider" min="10" max="300" value="100">
                </div>
                <div class="input-group">
                    <span class="slider-label">4. フレームのサイズ調整:</span>
                    <input type="range" id="size-slider" min="50" max="150" value="100">
                </div>
            </div>
        </div>
        
        <div id="editor-container">
            <img id="base-image" src="" alt="">
            <img id="overlay-image" src="image1.png" alt="frame">
        </div>
        
        <button id="save-btn" class="btn-save">完成画像を作成する</button>
    </div>

    <div class="info-section">
        <h3>使い方</h3>
        <ul class="usage-list">
            <li><strong>① 写真とフレームを選ぶ</strong></li>
            <li><strong>② 写真を調整する</strong><br>
                <small>ドラッグで移動、スライダーで拡大縮小できます。</small>
            </li>
            <li><strong>③ 画像を作成する</strong><br>
                <small>ボタンを押すと保存用画面が開きます。</small>
            </li>
            <li><strong>④ 保存する</strong><br>
                <small>表示された画像を<strong>長押し</strong>して保存してください。</small>
            </li>
        </ul>
    </div>
</div>

<div id="save-preview">
    <img id="final-image" src="" alt="完成画像">
    <p style="margin-top:15px; font-weight:bold; background:#f472b6; padding:8px 20px; border-radius:20px;">
        画像を長押しして保存してくだちい。
    </p>
    <button class="close-btn" onclick="document.getElementById('save-preview').style.display='none'">編集に戻る</button>
</div>

<footer>
    ©プロジェクトラブライブ！蓮ノ空女学院スクールアイドルクラブ
</footer>

<script>
    const container = document.getElementById('editor-container');
    const baseImg = document.getElementById('base-image');
    const overlayImg = document.getElementById('overlay-image');
    const sizeSlider = document.getElementById('size-slider');
    const bgScaleSlider = document.getElementById('bg-scale-slider');
    const sizeControls = document.getElementById('size-controls');
    const saveBtn = document.getElementById('save-btn');
    const frameSelector = document.getElementById('frame-selector');
    const savePreview = document.getElementById('save-preview');
    const finalImg = document.getElementById('final-image');

    let posX = 0, posY = 0, imgScale = 1, isDragging = false, startX, startY;

    frameSelector.addEventListener('change', () => { overlayImg.src = frameSelector.value; });

    document.getElementById('upload-base').addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            baseImg.src = event.target.result;
            baseImg.style.display = 'block';
            baseImg.onload = () => {
                posX = container.offsetWidth / 2;
                posY = container.offsetHeight / 2;
                updateTransform();
            };
            sizeControls.style.display = 'block';
            saveBtn.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    bgScaleSlider.addEventListener('input', () => { imgScale = bgScaleSlider.value / 100; updateTransform(); });
    sizeSlider.addEventListener('input', () => { overlayImg.style.width = sizeSlider.value + "%"; });

    container.addEventListener('pointerdown', (e) => {
        if (baseImg.src === "") return;
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
        container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        updateTransform();
    });

    container.addEventListener('pointerup', () => { isDragging = false; });

    function updateTransform() {
        baseImg.style.transform = `translate(${posX - baseImg.width/2}px, ${posY - baseImg.height/2}px) scale(${imgScale})`;
    }

    saveBtn.addEventListener('click', () => {
        const finalCanvas = document.createElement('canvas');
        const ctx = finalCanvas.getContext('2d');
        const outputSize = 1000;
        finalCanvas.width = outputSize;
        finalCanvas.height = outputSize;
        const renderScale = outputSize / container.offsetWidth;

        const img = new Image();
        img.src = baseImg.src;
        img.onload = () => {
            ctx.save();
            ctx.translate(posX * renderScale, posY * renderScale);
            ctx.scale(imgScale * renderScale, imgScale * renderScale);
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();

            const fImg = new Image();
            fImg.src = overlayImg.src;
            fImg.onload = () => {
                const fScale = sizeSlider.value / 100;
                const dw = outputSize * fScale;
                const dh = outputSize * fScale;
                ctx.drawImage(fImg, (outputSize - dw) / 2, (outputSize - dh) / 2, dw, dh);

                // 完成した画像をプレビュー画面にセットして表示
                finalImg.src = finalCanvas.toDataURL('image/png');
                savePreview.style.display = 'flex';
            };
        };
    });
</script>

</body>
</html>
