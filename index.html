<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宣伝アンバサダー画像メーカー</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdf2f8; margin: 20px; color: #333; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
        .input-group { margin-bottom: 15px; }
        .slider-label { display: block; margin-top: 10px; font-weight: bold; }
        
        #editor-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #fff;
            overflow: hidden;
            border: 4px solid #f472b6;
        }

        .img-container { width: 100%; height: 100%; }
        #base-image { display: block; max-width: 100%; }

        /* フレーム設定：中央固定・移動不可 */
        #overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none; /* 下の画像を操作できるように設定 */
            user-select: none;
            width: 100%;
        }

        button { padding: 10px 20px; cursor: pointer; background: #f472b6; color: white; border: none; border-radius: 20px; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #db2777; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<div class="controls">
    <h3>宣伝アンバサダー画像作成</h3>
    <div class="input-group">
        <label>1. 背景写真を選択: </label>
        <input type="file" id="upload-base" accept="image/*">
    </div>
    
    <button id="crop-btn">2. 背景のトリミングを確定</button>

    <div class="input-group">
        <span class="slider-label">3. フレームのサイズ調整:</span>
        <input type="range" id="size-slider" min="50" max="150" value="100">
    </div>
</div>

<div id="editor-container">
    <div class="img-container">
        <img id="base-image" src="" alt="">
    </div>
    <img id="overlay-image" src="image.png" alt="frame">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const baseImg = document.getElementById('base-image');
    const overlayImg = document.getElementById('overlay-image');
    const sizeSlider = document.getElementById('size-slider');

    // 背景画像の読み込みとトリミング設定
    document.getElementById('upload-base').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            baseImg.src = event.target.result;
            if (cropper) cropper.destroy();
            cropper = new Cropper(baseImg, {
                aspectRatio: 1, // 正方形
                viewMode: 1,
                autoCropArea: 1,
                dragMode: 'move',
                background: false
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 背景の確定
    document.getElementById('crop-btn').addEventListener('click', function() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({ width: 1000, height: 1000 });
        baseImg.src = canvas.toDataURL();
        cropper.destroy();
        cropper = null;
        baseImg.style.width = "100%";
    });

    // フレームのサイズ変更
    sizeSlider.addEventListener('input', function() {
        overlayImg.style.width = this.value + "%";
    });
</script>

</body>
</html>
