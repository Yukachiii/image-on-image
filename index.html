<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宣伝アンバサダー画像メーカー</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; background: #fdf2f8; margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; }
        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; width: 100%; justify-content: center; }
        .editor-section { flex: 1; min-width: 300px; max-width: 500px; }
        .info-section { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-self: flex-start; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .slider-label { display: block; margin-top: 10px; font-weight: bold; }
        
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; cursor: pointer; }

        #editor-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #fff;
            overflow: hidden;
            border: 4px solid #f472b6;
            margin-bottom: 20px;
        }

        .cropper-container { width: 100% !important; height: 100% !important; }

        #overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            user-select: none;
            width: 100%;
            display: none;
            opacity: 0.7;
        }
        #overlay-image.is-fixed { opacity: 1; }

        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 20px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: #f472b6; color: white; }
        .btn-primary:hover { background: #db2777; }
        .btn-save { background: #10b981; color: white; display: none; margin-top: 20px; font-size: 1.1em; }
        .btn-save:hover { background: #059669; }

        input[type="range"] { width: 100%; cursor: pointer; }
        #size-controls { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }

        h3 { margin-top: 0; color: #f472b6; border-bottom: 2px solid #fdf2f8; padding-bottom: 10px; }
        .usage-list { padding-left: 20px; line-height: 1.6; }
        .usage-note { font-size: 0.9em; color: #666; margin-bottom: 8px; list-style: none; }
        
        footer { margin-top: 40px; padding: 20px; font-size: 0.8em; color: #999; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="editor-section">
        <div class="controls">
            <h3>宣伝アンバサダー画像作成</h3>
            
            <div class="input-group">
                <label>1. 背景写真を選択: </label>
                <input type="file" id="upload-base" accept="image/*">
            </div>

            <div class="input-group">
                <label>2. フレームを選択:</label>
                <select id="frame-selector">
                    <option value="image1.png">フレーム1</option>
                    <option value="image2.png">フレーム2</option>
                    <option value="image3.png">フレーム3</option>
                    <option value="image4.png">フレーム4</option>
                    <option value="image5.png">フレーム5</option>
                    <option value="image6.png">フレーム6</option>
                    <option value="image7.png">フレーム7</option>
                    <option value="image8.png">フレーム8</option>
                    <option value="image9.png">フレーム9</option>
                    <option value="image10.png">フレーム10</option>
                    <option value="image11.png">フレーム11</option>
                    <option value="image12.png">フレーム12</option>
                </select>
            </div>

            <button id="crop-btn" class="btn-primary" style="display:none;">3. トリミング位置を確定</button>
            
            <div id="size-controls">
                <div class="input-group">
                    <span class="slider-label">4. フレームのサイズ調整:</span>
                    <input type="range" id="size-slider" min="50" max="150" value="100">
                </div>
            </div>
        </div>

        <div id="editor-container">
            <img id="base-image" src="" alt="">
            <img id="overlay-image" src="image1.png" alt="frame">
        </div>

        <button id="save-btn" class="btn-save">画像を保存する</button>
    </div>

    <div class="info-section">
        <h3>使い方</h3>
        <ul class="usage-list">
            <li><strong>① 画像を選びます</strong></li>
            <li><strong>② フレームを選びます</strong></li>
            <li><strong>③ 位置を調整します</strong>
                <div class="usage-note">選んだフレームがガイドとして表示されます。ロゴや枠に被らないように調整してください。</div>
            </li>
            <li><strong>④ 確定して保存します</strong>
                <div class="usage-note">お好みでフレームのサイズを調整して保存ボタンを押してください。</div>
            </li>
        </ul>
    </div>
</div>

<footer>
    ©プロジェクトラブライブ！蓮ノ空女学院スクールアイドルクラブ
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const baseImg = document.getElementById('base-image');
    const overlayImg = document.getElementById('overlay-image');
    const sizeSlider = document.getElementById('size-slider');
    const sizeControls = document.getElementById('size-controls');
    const saveBtn = document.getElementById('save-btn');
    const cropBtn = document.getElementById('crop-btn');
    const frameSelector = document.getElementById('frame-selector');

    // フレームの切り替え
    frameSelector.addEventListener('change', function() {
        overlayImg.src = this.value;
    });

    // ファイル選択時
    document.getElementById('upload-base').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            baseImg.src = event.target.result;
            
            overlayImg.style.display = 'block';
            overlayImg.classList.remove('is-fixed');
            overlayImg.style.opacity = "0.6";
            sizeControls.style.display = 'none';
            saveBtn.style.display = 'none';
            cropBtn.style.display = 'block';

            if (cropper) cropper.destroy();
            
            cropper = new Cropper(baseImg, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                guides: false,
                center: true,
                background: false,
                autoCropArea: 1,
                cropBoxMovable: false,
                cropBoxResizable: false,
                ready() {
                    overlayImg.style.width = "100%";
                }
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // トリミング確定
    cropBtn.addEventListener('click', function() {
        if (!cropper) return;
        
        const canvas = cropper.getCroppedCanvas({ width: 1000, height: 1000 });
        baseImg.src = canvas.toDataURL();
        
        cropper.destroy();
        cropper = null;
        
        baseImg.style.width = "100%";
        overlayImg.classList.add('is-fixed');
        overlayImg.style.opacity = "1";
        sizeControls.style.display = 'block';
        saveBtn.style.display = 'block';
        cropBtn.style.display = 'none';
    });

    sizeSlider.addEventListener('input', function() {
        overlayImg.style.width = this.value + "%";
    });

    // 保存処理
    saveBtn.addEventListener('click', function() {
        const finalCanvas = document.createElement('canvas');
        const ctx = finalCanvas.getContext('2d');
        finalCanvas.width = 1000;
        finalCanvas.height = 1000;

        const baseImgForCanvas = new Image();
        baseImgForCanvas.src = baseImg.src;
        baseImgForCanvas.onload = function() {
            ctx.drawImage(baseImgForCanvas, 0, 0, 1000, 1000);
            
            const frameImgForCanvas = new Image();
            frameImgForCanvas.src = overlayImg.src;
            frameImgForCanvas.onload = function() {
                const scale = sizeSlider.value / 100;
                const dw = 1000 * scale;
                const dh = 1000 * scale;
                const dx = (1000 - dw) / 2;
                const dy = (1000 - dh) / 2;
                
                ctx.drawImage(frameImgForCanvas, dx, dy, dw, dh);
                
                const link = document.createElement('a');
                link.download = 'ambassador-image.png';
                link.href = finalCanvas.toDataURL('image/png');
                link.click();
            };
            frameImgForCanvas.onerror = function() {
                alert('エラー: 選択された画像 (' + overlayImg.src.split('/').pop() + ') が見つかりません。同じフォルダに配置されているか確認してください。');
            }
        };
    });
</script>

</body>
</html>
