<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宣伝アンバサダー画像メーカー</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdf2f8; margin: 20px; color: #333; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
        .input-group { margin-bottom: 15px; }
        .slider-label { display: block; margin-top: 10px; font-weight: bold; }
        
        #editor-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #fff;
            overflow: hidden;
            border: 4px solid #f472b6;
            margin-bottom: 20px;
        }

        .img-container { width: 100%; height: 100%; }
        #base-image { display: block; max-width: 100%; }

        /* フレーム設定：最初は非表示 (display: none) */
        #overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            user-select: none;
            width: 100%;
            display: none; /* 初期状態は非表示 */
        }

        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 20px; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* プライマリボタン（ピンク） */
        .btn-primary { background: #f472b6; color: white; }
        .btn-primary:hover { background: #db2777; }
        
        /* 保存ボタン（緑） */
        .btn-save { background: #10b981; color: white; display: none; margin-top: 20px; }
        .btn-save:hover { background: #059669; }

        input[type="range"] { width: 100%; }
        
        /* サイズ調整エリア：最初は非表示 */
        #size-controls { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <h3>宣伝アンバサダー画像作成</h3>
    
    <div class="input-group">
        <label>1. 背景写真を選択: </label>
        <input type="file" id="upload-base" accept="image/*">
    </div>
    
    <button id="crop-btn" class="btn-primary">2. 背景のトリミングを確定</button>

    <div id="size-controls">
        <div class="input-group">
            <span class="slider-label">3. フレームのサイズ調整:</span>
            <input type="range" id="size-slider" min="50" max="150" value="100">
        </div>
    </div>
</div>

<div id="editor-container">
    <div class="img-container">
        <img id="base-image" src="" alt="">
    </div>
    <img id="overlay-image" src="image.png" alt="frame">
</div>

<button id="save-btn" class="btn-save">画像を保存する</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const baseImg = document.getElementById('base-image');
    const overlayImg = document.getElementById('overlay-image');
    const sizeSlider = document.getElementById('size-slider');
    const sizeControls = document.getElementById('size-controls');
    const saveBtn = document.getElementById('save-btn');

    // 背景画像の読み込みとトリミング設定
    document.getElementById('upload-base').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            baseImg.src = event.target.result;
            // 新しい画像が読み込まれたら、フレームや保存ボタンを一旦隠す
            overlayImg.style.display = 'none';
            sizeControls.style.display = 'none';
            saveBtn.style.display = 'none';

            if (cropper) cropper.destroy();
            cropper = new Cropper(baseImg, {
                aspectRatio: 1, // 正方形
                viewMode: 1,
                autoCropArea: 1,
                dragMode: 'move',
                background: false
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 確定処理 (ここがポイントです)
    document.getElementById('crop-btn').addEventListener('click', function() {
        if (!cropper) return;
        
        // 背景を正方形(1000x1000)で切り出す
        const canvas = cropper.getCroppedCanvas({ width: 1000, height: 1000 });
        baseImg.src = canvas.toDataURL(); // 切り出した画像をセット
        cropper.destroy(); // トリミング機能を終了
        cropper = null;
        baseImg.style.width = "100%"; // 画面幅に合わせる

        // 【追加機能】トリミング確定後にフレームと調整スライダー、保存ボタンを表示
        overlayImg.style.display = 'block';
        sizeControls.style.display = 'block';
        saveBtn.style.display = 'block';
    });

    // フレームのサイズ変更
    sizeSlider.addEventListener('input', function() {
        overlayImg.style.width = this.value + "%";
    });

    // 【追加機能】画像を合成して保存
    saveBtn.addEventListener('click', function() {
        const container = document.getElementById('editor-container');
        const finalCanvas = document.createElement('canvas');
        const ctx = finalCanvas.getContext('2d');

        // 合成用キャンバスのサイズを設定 (1000x1000)
        finalCanvas.width = 1000;
        finalCanvas.height = 1000;

        // 1. 背景画像をCanvasに描画
        const baseImgForCanvas = new Image();
        baseImgForCanvas.src = baseImg.src;
        
        baseImgForCanvas.onload = function() {
            ctx.drawImage(baseImgForCanvas, 0, 0, 1000, 1000);

            // 2. フレーム画像をCanvasに描画
            const frameImgForCanvas = new Image();
            frameImgForCanvas.src = overlayImg.src;
            
            frameImgForCanvas.onload = function() {
                // スライダーによる現在の拡大率を取得
                const scale = sizeSlider.value / 100;
                
                // 描画サイズと位置の計算 (中央配置)
                const dw = 1000 * scale;
                const dh = 1000 * scale;
                const dx = (1000 - dw) / 2;
                const dy = (1000 - dh) / 2;

                ctx.drawImage(frameImgForCanvas, dx, dy, dw, dh);

                // 3. ダウンロード用リンクを作成
                const link = document.createElement('a');
                link.download = 'ambassador-image.png'; // ファイル名
                link.href = finalCanvas.toDataURL('image/png');
                link.click();
            };
            
            // フレーム画像の読み込みに失敗した場合（image.png がないなど）
            frameImgForCanvas.onerror = function() {
                alert('フレーム画像（image.png）の読み込みに失敗しました。リポジトリに画像がアップロードされているか確認してください。');
            }
        };
    });
</script>

</body>
</html>
